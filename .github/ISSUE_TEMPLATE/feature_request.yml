name: Feature request
description: Suggest an improvement to ChillSSL
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you’re trying to solve. We may not share implementation details of monitoring/scanning internals.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea (optional)
      description: How you imagine it working in the product UI.
    validations:
      required: false
  - type: checkboxes
    id: hygiene
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for a similar request
          required: true
